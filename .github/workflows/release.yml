name: Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]

permissions:
  contents: write


env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Cargo.toml version
        id: cargo_version
        run: |
          VERSION=$(cargo metadata --format-version=1 --no-deps | jq '.packages[0].version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get tag version
        id: tag_version
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "version=$TAG" >> $GITHUB_OUTPUT

      - name: Ensure tag matches Cargo.toml
        run: |
          if [ "${{ steps.cargo_version.outputs.version }}" != "${{ steps.tag_version.outputs.version }}" ]; then
            echo "Tag version does not match Cargo.toml"
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2